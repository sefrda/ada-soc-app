<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Celá práce – Stomiiformes</title>
  <link rel="stylesheet" href="shared/layout.css">
  <style>
    .pdf-toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #163a74;
      border-bottom: 1px solid #1f4d96;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .pdf-toolbar h2 {
      font-size: 15px;
      font-weight: 700;
    }

    .pdf-buttons {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .pdf-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: #0d2255;
      border: 1px solid #eb9b1f;
      border-radius: 6px;
      color: #ffffff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    .pdf-btn:hover { background: #163a74; }

    /* Desktop: iframe fills remaining space */
    .pdf-frame {
      width: 100%;
      flex: 1;
      border: none;
      display: block;
      min-height: 0;
    }

    /* Mobile: iframe as preview only */
    .pdf-mobile-note {
      display: none;
    }

    @media (max-width: 768px) {
      .pdf-frame {
        flex: none;
        height: 55vh;
      }
      .pdf-mobile-note {
        display: block;
        text-align: center;
        padding: 12px 16px;
        font-size: 12px;
        color: #4a6a9a;
        border-top: 1px solid #1f4d96;
      }
    }
  </style>
</head>
<body>

<div id="header-placeholder"></div>

<div class="page-body">
  <div id="nav-placeholder"></div>

  <main class="site-main fill">

    <div class="pdf-toolbar">
      <h2>📄 Celá práce</h2>
      <div class="pdf-buttons">
        <a class="pdf-btn" href="SOC_ASefrhansova_2026.pdf" target="_blank" rel="noopener">
          🔗 Otevřít v prohlížeči
        </a>
        <a class="pdf-btn" href="SOC_ASefrhansova_2026.pdf" download>
          ⬇ Stáhnout PDF
        </a>
      </div>
    </div>

    <iframe
      class="pdf-frame"
      src="SOC_ASefrhansova_2026.pdf"
      title="SOČ – Adéla Šefrhansová">
    </iframe>

    <p class="pdf-mobile-note">
      Náhled 1. stránky – pro čtení celé práce použij tlačítko <strong>Otevřít v prohlížeči</strong> výše.
    </p>

  </main>
</div>

<div id="footer-placeholder"></div>

<script src="shared/nav.js"></script>
</body>
</html>
