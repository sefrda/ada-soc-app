<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Video – Stomiiformes</title>
  <link rel="stylesheet" href="shared/layout.css">
  <style>
    .video-content {
      padding: 24px 20px;
      max-width: 900px;
    }

    h2 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #ffffff;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%; /* 16:9 */
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #1f4d96;
    }

    .video-wrapper iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<div id="header-placeholder"></div>

<div class="page-body">
  <div id="nav-placeholder"></div>

  <main class="site-main">
    <div class="video-content">
      <h2>▶️ Video</h2>
      <div class="video-wrapper">
        <iframe
          src="https://www.youtube.com/embed/ZS_aVh2Uosk"
          title="Video – Stomiiformes"
          allowfullscreen>
        </iframe>
      </div>
    </div>
  </main>
</div>

<div id="footer-placeholder"></div>

<script src="shared/nav.js"></script>
</body>
</html>
