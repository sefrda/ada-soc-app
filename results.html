<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Výsledky – Stomiiformes</title>
  <link rel="stylesheet" href="shared/layout.css">
  <style>
    /* Sticky search bar inside scrollable main */
    .search-bar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #163a74;
      border-bottom: 1px solid #1f4d96;
      padding: 12px 16px;
    }

    .search-bar h2 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #ffffff;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    input[type="text"] {
      flex: 1;
      min-width: 120px;
      padding: 8px 12px;
      background: #0d2255;
      border: 1px solid #1f4d96;
      border-radius: 6px;
      color: #ffffff;
      font-family: Arial, sans-serif;
      font-size: 13px;
      outline: none;
    }

    input[type="text"]::placeholder { color: #4a6a9a; }
    input[type="text"]:focus { border-color: #eb9b1f; }

    select {
      padding: 8px 10px;
      background: #0d2255;
      border: 1px solid #1f4d96;
      border-radius: 6px;
      color: #ffffff;
      font-family: Arial, sans-serif;
      font-size: 13px;
      outline: none;
    }

    select:focus { border-color: #eb9b1f; }

    .count {
      font-size: 11px;
      color: #4a6a9a;
      padding: 5px 0 0;
    }

    /* Table */
    .table-wrap {
      overflow-x: auto;
      overflow-y: visible;
      padding: 0 12px 24px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      background: #163a74;
      color: #eb9b1f;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 10px 8px;
      text-align: left;
      border-bottom: 2px solid #eb9b1f;
      white-space: nowrap;
      position: sticky;
      top: 0;
      z-index: 5;
    }

    tbody tr {
      border-bottom: 1px solid #163a74;
      cursor: pointer;
      transition: background 0.1s;
    }

    tbody tr:hover { background: #163a74; }

    tbody td {
      padding: 9px 8px;
      vertical-align: middle;
      white-space: nowrap;
    }

    td.species { font-style: italic; color: #ffffff; }
    td.code { font-family: monospace; font-size: 12px; color: #eb9b1f; }

    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 700;
    }

    .pill-yes  { background: #0d3d2a; color: #4ecb8a; }
    .pill-no   { background: #3d1a0d; color: #e07a5f; }
    .pill-warn { background: #3d2e0d; color: #eb9b1f; }

    .sim-bar { display: flex; align-items: center; gap: 6px; }
    .sim-fill { height: 6px; border-radius: 3px; background: #eb9b1f; min-width: 2px; }
    .sim-val  { color: #a8c4e8; font-size: 12px; min-width: 36px; }

    .thumb {
      width: 36px; height: 36px;
      object-fit: cover; border-radius: 4px;
      background: #1f4d96; display: block;
    }

    .thumb-placeholder {
      width: 36px; height: 36px;
      background: #1f4d96; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      color: #4a6a9a; font-size: 16px;
    }

    .no-results {
      text-align: center; padding: 40px 20px; color: #4a6a9a;
    }

    /* Mobile: allow text wrapping, hide progress bar */
    @media (max-width: 600px) {
      tbody td { white-space: normal; }
      td.species { max-width: 120px; word-break: break-word; }
      .sim-bar { display: none; }
      .sim-pct { display: inline; }
    }
    @media (min-width: 601px) {
      .sim-pct { display: none; }
    }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.85); z-index: 100;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #163a74; border: 2px solid #eb9b1f;
      border-radius: 12px; max-width: 500px; width: 100%; overflow: hidden;
    }

    .modal-img {
      width: 100%; max-height: 320px; object-fit: contain;
      background: #0d2255; display: block;
    }

    .modal-body { padding: 20px; }
    .modal-kod { font-family: monospace; font-size: 12px; color: #eb9b1f; margin-bottom: 4px; }
    .modal-name { font-size: 18px; font-weight: 700; font-style: italic; color: #ffffff; margin-bottom: 16px; line-height: 1.3; }

    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .modal-field label { font-size: 10px; letter-spacing: 0.8px; text-transform: uppercase; color: #eb9b1f; display: block; margin-bottom: 3px; font-weight: 700; }
    .modal-field span { font-size: 13px; color: #ffffff; }

    .modal-close {
      width: 100%; padding: 12px; background: #eb9b1f; color: #fff;
      border: none; font-family: Arial, sans-serif; font-size: 14px;
      font-weight: 700; cursor: pointer; border-radius: 6px;
    }
  </style>
</head>
<body>

<div id="header-placeholder"></div>

<div class="page-body">
  <div id="nav-placeholder"></div>

  <main class="site-main">

    <div class="search-bar">
      <h2>🔬 Výsledky analýzy</h2>
      <div class="controls">
        <input type="text" id="search" placeholder="Hledat (kód, druh, čeleď…)">
        <select id="filter-rad"><option value="">Všechny řády</option></select>
        <select id="filter-fylo">
          <option value="">Vše – fylogenetika</option>
          <option value="ano">Zařazen: ano</option>
          <option value="ne">Zařazen: ne</option>
        </select>
      </div>
      <p class="count" id="count"></p>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Foto</th>
            <th>Kód</th>
            <th>Určení (BLAST)</th>
            <th>Podobnost</th>
            <th>Řád</th>
            <th>Čeleď</th>
            <th>Sekvence COX1</th>
            <th>Fylogenetika</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <p class="no-results" id="no-results" style="display:none">Žádné výsledky neodpovídají filtru.</p>
    </div>

  </main>
</div>

<div id="footer-placeholder"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <img class="modal-img" id="modal-img" src="" alt="">
    <div class="modal-body">
      <p class="modal-kod" id="modal-kod"></p>
      <p class="modal-name" id="modal-name"></p>
      <div class="modal-grid">
        <div class="modal-field"><label>Morfologie</label><span id="modal-morfologie"></span></div>
        <div class="modal-field"><label>Podobnost BLAST</label><span id="modal-sim"></span></div>
        <div class="modal-field"><label>Řád</label><span id="modal-rad"></span></div>
        <div class="modal-field"><label>Čeleď</label><span id="modal-celed"></span></div>
        <div class="modal-field"><label>Sekvence COX1</label><span id="modal-cox1"></span></div>
        <div class="modal-field"><label>Fylogenetická analýza</label><span id="modal-fylo"></span></div>
      </div>
      <button class="modal-close" id="modal-close">Zavřít</button>
    </div>
  </div>
</div>

<script src="shared/nav.js"></script>
<script>
  let data = [], filtered = [];

  fetch('data.json').then(r => r.json()).then(d => {
    data = d;
    const rady = [...new Set(d.map(r => r.rad).filter(Boolean))].sort();
    const sel = document.getElementById('filter-rad');
    rady.forEach(r => { const o = document.createElement('option'); o.value = r; o.textContent = r; sel.appendChild(o); });
    render();
  });

  function simPill(val) {
    if (val == null) return '<span style="color:#4a6a9a">–</span>';
    const pct = Math.round(val * 100);
    return `<div class="sim-bar"><div class="sim-fill" style="width:${Math.max(4,pct)}px"></div><span class="sim-val">${pct}%</span></div><span class="sim-pct" style="color:#a8c4e8;font-size:12px;">${pct}%</span>`;
  }

  function fylogPill(val) {
    if (!val) return '–';
    if (val === 'ano') return '<span class="pill pill-yes">ano</span>';
    if (val === 'ne')  return '<span class="pill pill-no">ne</span>';
    return `<span class="pill pill-warn">${val}</span>`;
  }

  function coxPill(val) {
    if (val === 'ano') return '<span class="pill pill-yes">ano</span>';
    if (val === 'ne')  return '<span class="pill pill-no">ne</span>';
    return val || '–';
  }

  function render() {
    const q    = document.getElementById('search').value.toLowerCase();
    const rad  = document.getElementById('filter-rad').value;
    const fylo = document.getElementById('filter-fylo').value;

    filtered = data.filter(r => {
      if (rad  && r.rad !== rad) return false;
      if (fylo === 'ano' && r.fylogenetika !== 'ano') return false;
      if (fylo === 'ne'  && r.fylogenetika === 'ano') return false;
      if (q && ![r.kod, r.blast_urceni, r.morfologie, r.rad, r.celed].join(' ').toLowerCase().includes(q)) return false;
      return true;
    });

    document.getElementById('count').textContent = `Zobrazeno ${filtered.length} z ${data.length} vzorků`;

    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
    filtered.forEach(r => {
      const tr = document.createElement('tr');
      const imgSrc = r.foto ? `images/${r.foto}` : '';
      const thumb = imgSrc
        ? `<img class="thumb" src="${imgSrc}" alt="${r.kod}" loading="lazy">`
        : `<div class="thumb-placeholder">?</div>`;
      tr.innerHTML = `
        <td>${thumb}</td>
        <td class="code">${r.kod}</td>
        <td class="species">${r.blast_urceni || '<span style="color:#4a6a9a">–</span>'}</td>
        <td>${simPill(r.blast_podobnost)}</td>
        <td>${r.rad   || '<span style="color:#4a6a9a">–</span>'}</td>
        <td>${r.celed || '<span style="color:#4a6a9a">–</span>'}</td>
        <td>${coxPill(r['sekvence cox1'])}</td>
        <td>${fylogPill(r.fylogenetika)}</td>`;
      tr.addEventListener('click', () => openModal(r));
      tbody.appendChild(tr);
    });

    document.getElementById('no-results').style.display = filtered.length === 0 ? 'block' : 'none';
  }

  function openModal(r) {
    const imgSrc = r.foto ? `images/${r.foto}` : '';
    const img = document.getElementById('modal-img');
    img.src = imgSrc; img.style.display = imgSrc ? 'block' : 'none';
    document.getElementById('modal-kod').textContent  = r.kod;
    document.getElementById('modal-name').textContent = r.blast_urceni || r.morfologie || '–';
    document.getElementById('modal-morfologie').textContent = r.morfologie || '–';
    document.getElementById('modal-sim').textContent  = r.blast_podobnost != null ? Math.round(r.blast_podobnost * 100) + ' %' : '–';
    document.getElementById('modal-rad').textContent   = r.rad || '–';
    document.getElementById('modal-celed').textContent = r.celed || '–';
    document.getElementById('modal-cox1').textContent  = r['sekvence cox1'] || '–';
    document.getElementById('modal-fylo').textContent  = r.fylogenetika || '–';
    document.getElementById('modal-overlay').classList.add('open');
  }

  document.getElementById('modal-close').addEventListener('click', () => document.getElementById('modal-overlay').classList.remove('open'));
  document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) document.getElementById('modal-overlay').classList.remove('open'); });
  document.getElementById('search').addEventListener('input', render);
  document.getElementById('filter-rad').addEventListener('change', render);
  document.getElementById('filter-fylo').addEventListener('change', render);
</script>
</body>
</html>
