<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOČ – Adéla Šefrhansová</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a1628;
      color: #e8f0fe;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
    }

    .card {
      background: #0f2040;
      border: 1px solid #1e3a5f;
      border-radius: 16px;
      padding: 36px 28px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: #1a4a8a;
      color: #90c8ff;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    .fish-icon {
      font-size: 48px;
      margin-bottom: 16px;
      display: block;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.4;
      color: #c8e0ff;
      margin-bottom: 10px;
    }

    .author {
      font-size: 15px;
      color: #7aa8d8;
      margin-bottom: 32px;
    }

    .divider {
      border: none;
      border-top: 1px solid #1e3a5f;
      margin: 0 0 28px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px 20px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.1s;
      cursor: pointer;
      border: none;
    }

    .btn:active { opacity: 0.85; transform: scale(0.98); }

    .btn-primary {
      background: #1a6fd4;
      color: #fff;
      margin-bottom: 12px;
    }

    .btn-secondary {
      background: #0f2040;
      color: #90c8ff;
      border: 1px solid #1e3a5f;
    }

    .btn-icon { font-size: 18px; }

    footer {
      margin-top: 32px;
      font-size: 12px;
      color: #3a5a7a;
    }
  </style>
</head>
<body>

  <div class="card">
    <span class="badge">SOČ 2026</span>
    <span class="fish-icon">🐟</span>
    <h1>Molekulární určování druhů hlubokomořských ryb z řádu Stomiiformes</h1>
    <p class="author">Adéla Šefrhansová</p>

    <hr class="divider">

    <a class="btn btn-primary" href="SOC_ASefrhansova_2026.pdf" target="_blank">
      <span class="btn-icon">📄</span>
      Číst celou práci (PDF)
    </a>

    <a class="btn btn-secondary" href="results.html">
      <span class="btn-icon">🔬</span>
      Zobrazit výsledky
    </a>
  </div>

  <footer>Středoškolská odborná činnost</footer>

</body>
</html>
