<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOČ – Adéla Šefrhansová</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #0d2255;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
    }

    .card {
      background: #163a74;
      border: 1px solid #1f4d96;
      border-radius: 12px;
      padding: 36px 28px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: #eb9b1f;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    .fish-icon {
      font-size: 48px;
      margin-bottom: 16px;
      display: block;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.4;
      color: #ffffff;
      margin-bottom: 10px;
    }

    .author {
      font-size: 15px;
      color: #a8c4e8;
      margin-bottom: 32px;
    }

    .divider {
      border: none;
      border-top: 1px solid #1f4d96;
      margin: 0 0 28px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px 20px;
      border-radius: 8px;
      font-family: Arial, sans-serif;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.1s;
      cursor: pointer;
      border: none;
    }

    .btn:active { opacity: 0.85; transform: scale(0.98); }

    .btn-primary {
      background: #163a74;
      color: #ffffff;
      border: 1px solid #eb9b1f;
      margin-bottom: 12px;
    }

    .btn-secondary {
      background: #163a74;
      color: #ffffff;
      border: 1px solid #eb9b1f;
    }

    .btn-icon { font-size: 18px; }

    footer {
      margin-top: 32px;
      font-size: 12px;
      color: #4a6a9a;
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>

  <div class="card">
    <span class="badge">SOČ 2026</span>
    <img src="Logo.jpeg" alt="Logo" style="width:120px; height:120px; object-fit:contain; margin-bottom:16px; display:block; margin-left:auto; margin-right:auto;">
    <h1>Molekulární určování druhů hlubokomořských ryb z řádu Stomiiformes</h1>
    <p class="author">Adéla Šefrhansová</p>

    <hr class="divider">

    <a class="btn btn-primary" href="SOC_ASefrhansova_2026.pdf" target="_blank">
      <span class="btn-icon">📄</span>
      Číst celou práci (PDF)
    </a>

    <a class="btn btn-secondary" href="results.html">
      <span class="btn-icon">🔬</span>
      Zobrazit výsledky
    </a>

    <a class="btn btn-secondary" href="tree.html" style="margin-top:12px;">
      <span class="btn-icon">🌿</span>
      Fylogenetický strom
    </a>

    <a class="btn btn-secondary" href="https://youtu.be/ZS_aVh2Uosk?si=HzWGDUR0qawZ5g7N" target="_blank" style="margin-top:12px;">
      <span class="btn-icon">▶️</span>
      Přehrát video
    </a>
  </div>

  <footer>Středoškolská odborná činnost</footer>

</body>
</html>
