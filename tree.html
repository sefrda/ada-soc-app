<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fylogenetický strom – Stomiiformes</title>
  <link rel="stylesheet" href="shared/layout.css">
  <style>
    .tree-toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #163a74;
      border-bottom: 1px solid #1f4d96;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .tree-toolbar h2 {
      font-size: 15px;
      font-weight: 700;
      flex: 1;
    }

    .hint {
      font-size: 12px;
      color: #eb9b1f;
      white-space: nowrap;
    }

    .zoom-btn {
      background: #0d2255;
      border: 1px solid #1f4d96;
      color: #fff;
      font-size: 18px;
      width: 34px;
      height: 34px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .zoom-btn:active { background: #1f4d96; }
    .zoom-label { font-size: 13px; color: #a8c4e8; min-width: 40px; text-align: center; }

    .svg-container {
      overflow: auto;
      padding: 16px;
      cursor: grab;
    }

    .svg-container:active { cursor: grabbing; }

    .svg-wrapper {
      display: inline-block;
      transform-origin: top left;
    }

    .zuk-label {
      cursor: pointer !important;
      fill: #eb9b1f !important;
      font-weight: bold !important;
    }

    .zuk-label:hover { opacity: 0.75; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.85); z-index: 100;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #163a74; border: 2px solid #eb9b1f;
      border-radius: 12px; max-width: 500px; width: 100%;
      overflow: hidden; max-height: 90vh; overflow-y: auto;
    }
    .modal-img { width: 100%; max-height: 280px; object-fit: contain; background: #0d2255; display: block; }
    .modal-body { padding: 20px; }
    .modal-kod  { font-family: monospace; font-size: 12px; color: #eb9b1f; margin-bottom: 4px; }
    .modal-name { font-size: 18px; font-weight: 700; font-style: italic; color: #fff; margin-bottom: 16px; line-height: 1.3; }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .modal-field label { font-size: 10px; letter-spacing: .8px; text-transform: uppercase; color: #eb9b1f; display: block; margin-bottom: 3px; font-weight: 700; }
    .modal-field span  { font-size: 13px; color: #fff; }
    .modal-close { width: 100%; padding: 12px; background: #eb9b1f; color: #fff; border: none; font-family: Arial, sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; border-radius: 6px; }
  </style>
</head>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <img class="modal-img" id="modal-img" src="" alt="">
    <div class="modal-body">
      <p class="modal-kod" id="modal-kod"></p>
      <p class="modal-name" id="modal-name"></p>
      <div class="modal-grid">
        <div class="modal-field"><label>Morfologie</label><span id="modal-morfologie"></span></div>
        <div class="modal-field"><label>Podobnost BLAST</label><span id="modal-sim"></span></div>
        <div class="modal-field"><label>Řád</label><span id="modal-rad"></span></div>
        <div class="modal-field"><label>Čeleď</label><span id="modal-celed"></span></div>
        <div class="modal-field"><label>Sekvence COX1</label><span id="modal-cox1"></span></div>
        <div class="modal-field"><label>Fylogenetická analýza</label><span id="modal-fylo"></span></div>
      </div>
      <button class="modal-close" id="modal-close">Zavřít</button>
    </div>
  </div>
</div>


<script src="shared/nav.js"></script>
<script>
  let dbData = [];
  let scale = 0.3;

  // Load database
  fetch('data.json')
    .then(r => r.json())
    .then(d => {
      dbData = d;
      initTree();
    });

  function initTree() {
    // Set initial zoom
    applyZoom();

    // Find all SVG text elements with ZUK_ prefix
    const texts = document.querySelectorAll('#svg-wrapper text');
    texts.forEach(el => {
      const t = el.textContent.trim();
      const m = t.match(/^ZUK_(\d+[A-Z]\d+)_/);
      if (m) {
        el.classList.add('zuk-label');
        el.dataset.kod = m[1];
        el.addEventListener('click', e => {
          e.stopPropagation();
          const record = dbData.find(r => r.kod === m[1]);
          if (record) openModal(record);
        });
      }
    });
  }

  // Zoom
  function applyZoom() {
    document.getElementById('svg-wrapper').style.transform = `scale(${scale})`;
    document.getElementById('svg-wrapper').style.width = (2102 * scale) + 'px';
    document.getElementById('svg-wrapper').style.height = (2802 * scale) + 'px';
    document.getElementById('zoom-val').textContent = Math.round(scale * 100) + '%';
  }

  document.getElementById('zoom-in').addEventListener('click', () => {
    scale = Math.min(scale + 0.1, 2.0);
    applyZoom();
  });

  document.getElementById('zoom-out').addEventListener('click', () => {
    scale = Math.max(scale - 0.1, 0.1);
    applyZoom();
  });

  // Modal
  function openModal(r) {
    const imgSrc = r.foto ? `images/${r.foto}` : '';
    const img = document.getElementById('modal-img');
    img.src = imgSrc;
    img.style.display = imgSrc ? 'block' : 'none';
    document.getElementById('modal-kod').textContent = r.kod;
    document.getElementById('modal-name').textContent = r.blast_urceni || r.morfologie || '–';
    document.getElementById('modal-morfologie').textContent = r.morfologie || '–';
    document.getElementById('modal-sim').textContent =
      r.blast_podobnost != null ? Math.round(r.blast_podobnost * 100) + ' %' : '–';
    document.getElementById('modal-rad').textContent = r.rad || '–';
    document.getElementById('modal-celed').textContent = r.celed || '–';
    document.getElementById('modal-cox1').textContent = r['sekvence cox1'] || '–';
    document.getElementById('modal-fylo').textContent = r.fylogenetika || '–';
    document.getElementById('modal-overlay').classList.add('open');
  }

  document.getElementById('modal-close').addEventListener('click', () => {
    document.getElementById('modal-overlay').classList.remove('open');
  });
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget)
      document.getElementById('modal-overlay').classList.remove('open');
  });
</script>
